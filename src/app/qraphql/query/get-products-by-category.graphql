query GetProductsByCategory($filter: ProductAttributeFilterInput!, $pageSize: Int, $currentPage: Int) {
  products(
    filter: $filter
    pageSize: $pageSize
    currentPage: $currentPage
  ) {
    items {
      id
      name
      sku
      price_range {
        minimum_price {
          final_price {
            value
            currency
          }
        }
      }
      small_image {
        url
        label
      }
      url_key
    }
    total_count
    page_info {
      current_page
      page_size
      total_pages
    }
    aggregations {
      attribute_code
      count
      label
      options {
        count
        label
        value
      }
    }
  }
}
