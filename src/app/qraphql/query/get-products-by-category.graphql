query GetProductsByCategory($filter: ProductAttributeFilterInput!, $pageSize: Int, $currentPage: Int, $sort: ProductAttributeSortInput) {
  products(
    filter: $filter
    pageSize: $pageSize
    currentPage: $currentPage
    sort: $sort
  ) {
    items {
      id
      name
      sku
      price_range {
        minimum_price {
          final_price {
            value
            currency
          }
          regular_price {
            value
            currency
          }
          discount {
            percent_off
            amount_off
          }
        }
      }
      small_image {
        url
        label
      }
      url_key
      type_id
      stock_status
      new_from_date
      new_to_date
      special_price
      special_from_date
      special_to_date
    }
    total_count
    page_info {
      current_page
      page_size
      total_pages
    }
    aggregations {
      attribute_code
      count
      label
      options {
        count
        label
        value
      }
    }
  }
}
