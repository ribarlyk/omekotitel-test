query SearchProducts($search: String!, $pageSize: Int) {
  products(search: $search, pageSize: $pageSize) {
    items {
      id
      name
      sku
      price_range {
        minimum_price {
          final_price {
            value
            currency
          }
          regular_price {
            value
            currency
          }
          discount {
            percent_off
            amount_off
          }
        }
      }
      small_image {
        url
        label
      }
      url_key
      type_id
      new_from_date
      new_to_date
      special_price
      special_from_date
      special_to_date
    }
    total_count
  }
}
