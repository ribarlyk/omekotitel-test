query GetProductsBySku($skus: [String!]!) {
  products(filter: { sku: { in: $skus } }, pageSize: 20) {
    items {
      id
      name
      sku
      url_key
      type_id
      stock_status
      new_from_date
      new_to_date
      special_price
      special_from_date
      special_to_date
      small_image {
        url
        label
      }
      price_range {
        minimum_price {
          final_price {
            value
            currency
          }
          regular_price {
            value
            currency
          }
          discount {
            percent_off
            amount_off
          }
        }
      }
    }
  }
}
