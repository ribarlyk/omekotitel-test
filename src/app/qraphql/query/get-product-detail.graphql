query GetProductDetail($urlKey: String!) {
  products(filter: { url_key: { eq: $urlKey } }) {
    items {
      id
      name
      sku
      description {
        html
      }
      short_description {
        html
      }
      price_range {
        minimum_price {
          final_price {
            value
            currency
          }
          regular_price {
            value
            currency
          }
        }
      }
      image {
        url
        label
      }
      media_gallery {
        url
        label
        position
      }
      categories {
        id
        name
        url_path
      }
      url_key
      type_id
      stock_status
      new_from_date
      new_to_date
      special_price
      special_from_date
      special_to_date
      Broi
      aromat
      aromat_dush_gel_2
      aromat_sapuni
      aromati
      broj_cikli_sushene
      broj_cikli_upotreba
      broj_izmivanija
      cvjat
      d_lgotrajnost
      dejstvie
      dejstvie_dush_gel
      dejstvie_dushgel_multiple
      koli_garderobi_prilozhenie
      kosa
      marki
      material_na_izrabotka
      materii_s_vmestimost_2
      mozhe_da_se_izpolzva_v
      obem_kapacitet
      podhodjascho_za
      podhodjascho_za_hrani
      prilozhenie
      proizhod
      razfasovka
      razmer
      svojstva
      temperaturna_ustojchivost
      tip_kosa
      tip_kuhnenska_prinadlejnost
      tip_podove_pov_rhnosti
      tip_podove_pov_rhnosti_2
      tip_vero
      tip_zatvarjane
      tretirane_na_petna_ot
      vid_materii
      ... on ConfigurableProduct {
        configurable_options {
          attribute_code
          label
          values {
            label
            value_index
          }
        }
        variants {
          attributes {
            code
            value_index
          }
          product {
            id
            sku
            stock_status
            special_from_date
            special_to_date
            small_image {
              url
              label
            }
            price_range {
              minimum_price {
                final_price {
                  value
                  currency
                }
                regular_price {
                  value
                  currency
                }
                discount {
                  percent_off
                  amount_off
                }
              }
            }
          }
        }
      }
    }
  }
}
