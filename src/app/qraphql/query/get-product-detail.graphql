query GetProductDetail($urlKey: String!) {
  products(filter: { url_key: { eq: $urlKey } }) {
    items {
      id
      name
      sku
      description {
        html
      }
      short_description {
        html
      }
      price_range {
        minimum_price {
          final_price {
            value
            currency
          }
          regular_price {
            value
            currency
          }
        }
      }
      image {
        url
        label
      }
      media_gallery {
        url
        label
        position
      }
      categories {
        id
        name
        url_path
      }
      url_key
      type_id
      stock_status
      new_from_date
      new_to_date
      special_price
      special_from_date
      special_to_date
      ... on ConfigurableProduct {
        configurable_options {
          attribute_code
          label
          values {
            label
            value_index
          }
        }
        variants {
          attributes {
            code
            value_index
          }
          product {
            id
            sku
            stock_status
            special_from_date
            special_to_date
            small_image {
              url
              label
            }
            price_range {
              minimum_price {
                final_price {
                  value
                  currency
                }
                regular_price {
                  value
                  currency
                }
                discount {
                  percent_off
                  amount_off
                }
              }
            }
          }
        }
      }
    }
  }
}
